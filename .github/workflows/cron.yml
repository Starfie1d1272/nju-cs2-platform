name: Cron — Draft Timeout

on:
  schedule:
    - cron: "* * * * *"  # 每分钟检查一次
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://match.starfie1d.top/api/cron/draft-timeout"
